# =============================================================================
# Kubernetes Kubeconfig File — Educational Reference
# =============================================================================
#
# What: A kubeconfig file configures access to Kubernetes clusters for kubectl.
#   It is NOT a Kubernetes resource — it is a local client configuration file,
#   typically located at ~/.kube/config.
#
# Three core sections:
#   - clusters:   Define which K8s API servers to connect to (server URL + CA cert)
#   - users:      Define authentication credentials (client certs, tokens, etc.)
#   - contexts:   Map (cluster + user + optional namespace) into a named context
#
# How kubectl uses it:
#   1. Reads kubeconfig (default: ~/.kube/config, or $KUBECONFIG env var)
#   2. Uses current-context to determine which cluster/user/namespace to use
#   3. Sends requests to the API server with the configured credentials
#
#   kubectl ---[kubeconfig]---> Context ---> Cluster (API Server)
#                                   |
#                                   +---> User (credentials)
#                                   |
#                                   +---> Namespace (optional scope)
#
# See also:
#   - 02-1-role.yaml for RBAC Role definitions
#   - 02-2-role-binding.yaml for binding users to roles
# =============================================================================
apiVersion: v1
kind: Config
current-context: my-kube-admin@my-kube-playground

# --- Clusters ---
# Define the Kubernetes API servers to connect to
clusters:
- name: my-kubernetes-playground
  cluster:
    certificate-authority: /path/to/ca.crt       # CA cert to verify the API server
    server: https://my-kube-playground:6443       # API server endpoint

# --- Users ---
# Define credentials for authenticating to the cluster
users:
- name: my-kube-admin
  user:
    client-certificate: /path/to/admin.crt       # Client certificate for mutual TLS
    client-key: /path/to/admin.key               # Client private key

# --- Contexts ---
# Map a cluster + user + namespace into a named context
contexts:
- name: my-kube-admin@my-kube-playground          # Format: user@cluster
  context:
    cluster: my-kubernetes-playground             # Must match a cluster name above
    user: my-kube-admin                           # Must match a user name above
    namespace: finance                            # Default namespace for this context

# View the kubeconfig:
#   kubectl config view
#
# List all contexts:
#   kubectl config get-contexts
#
# Switch the active context:
#   kubectl config use-context my-kube-admin@my-kube-playground
#
# Set default namespace for a context:
#   kubectl config set-context my-kube-admin@my-kube-playground --namespace=finance
#
# Use a custom kubeconfig file:
#   kubectl --kubeconfig=/path/to/custom-config get pods

