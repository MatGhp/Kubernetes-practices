# =============================================================================
# ServiceAccount + Role + RoleBinding + Pod — Educational Reference
# =============================================================================
#
# Goal: show, in ONE file, how the four pieces of namespaced RBAC fit
# together for a workload running inside the cluster.
#
#   Pod ──runs as──> ServiceAccount
#                          │
#                  RoleBinding (binds SA to Role)
#                          │
#                          ▼
#                        Role  (verbs × resources, namespaced)
#
# Mental model:
#   - ServiceAccount = WHO the Pod is (identity / authentication)
#   - Role           = WHAT actions are allowed (permissions)
#   - RoleBinding    = the link that grants the Role to the ServiceAccount
#   - Pod            = the workload using that identity to call the K8s API
#
# Without the RoleBinding the Pod still authenticates, but every API call is
# rejected with "forbidden". Authentication ≠ authorization.
#
# Scope note: Role + RoleBinding are NAMESPACED. For cluster-wide permissions
# use ClusterRole + ClusterRoleBinding (see 03-1 / 03-2 in this folder).
#
# See also:
#   - 02-1-role.yaml                  Role bound to a User (different subject kind)
#   - 02-2-role-binding.yaml          RoleBinding to a User
#   - demos/01-configuration/12-1..12-3  ServiceAccount and token mechanics
# =============================================================================


# -----------------------------------------------------------------------------
# 1. ServiceAccount — the Pod's identity
# -----------------------------------------------------------------------------

apiVersion: v1
kind: ServiceAccount
metadata:
  name: pod-reader-sa
  namespace: default

---

# -----------------------------------------------------------------------------
# 2. Role — what is allowed (read-only access to Pods in this namespace)
# -----------------------------------------------------------------------------

apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pod-reader
  namespace: default
rules:
  - apiGroups: [""]                  # Core API group (Pods, Services, ConfigMaps, ...)
    resources: ["pods"]
    verbs: ["get", "list", "watch"]  # Read-only — no create/update/delete

---

# -----------------------------------------------------------------------------
# 3. RoleBinding — connects the Role to the ServiceAccount
# -----------------------------------------------------------------------------
# `subjects` is WHO receives the permissions; `roleRef` is WHICH permissions.
# Note the SA subject requires kind: ServiceAccount and a `namespace` field.

apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pod-reader-binding
  namespace: default
subjects:
  - kind: ServiceAccount
    name: pod-reader-sa
    namespace: default               # SA's namespace (required for SA subjects)
roleRef:
  kind: Role
  name: pod-reader
  apiGroup: rbac.authorization.k8s.io

---

# -----------------------------------------------------------------------------
# 4. Pod — runs as the ServiceAccount and calls the K8s API to prove it works
# -----------------------------------------------------------------------------
# The container uses the auto-projected token at the standard path to call
# the API server. We list Pods (allowed) and try to list Secrets (denied) so
# you can SEE both authentication and authorization in action.

apiVersion: v1
kind: Pod
metadata:
  name: rbac-demo-pod
  namespace: default
  labels:
    app: rbac-demo-pod
spec:
  serviceAccountName: pod-reader-sa  # ← uses the SA defined above
  restartPolicy: Never
  containers:
    - name: client
      image: curlimages/curl:8.7.1
      command: ["sh", "-c"]
      args:
        - |
          set -eu
          API=https://kubernetes.default.svc
          SA_DIR=/var/run/secrets/kubernetes.io/serviceaccount
          TOKEN=$(cat $SA_DIR/token)
          CACERT=$SA_DIR/ca.crt
          NS=$(cat $SA_DIR/namespace)

          echo "==> GET /api/v1/namespaces/$NS/pods   (expected: 200 OK)"
          curl -sS --cacert $CACERT -H "Authorization: Bearer $TOKEN" \
            -o /dev/null -w "HTTP %{http_code}\n" \
            "$API/api/v1/namespaces/$NS/pods"

          echo "==> GET /api/v1/namespaces/$NS/secrets (expected: 403 Forbidden)"
          curl -sS --cacert $CACERT -H "Authorization: Bearer $TOKEN" \
            -o /dev/null -w "HTTP %{http_code}\n" \
            "$API/api/v1/namespaces/$NS/secrets"

          # Keep the Pod alive so you can re-exec into it
          sleep 3600


# =============================================================================
# Apply & verify
# =============================================================================
#
# Apply everything:
#   kubectl apply -f 02-3-pod-service-account-rbac.yaml
#
# Watch the demo output (run after the Pod is Running):
#   kubectl logs rbac-demo-pod
#   # Expected:
#   #   ==> GET .../pods    HTTP 200
#   #   ==> GET .../secrets HTTP 403
#
# Confirm the binding using `kubectl auth can-i` (impersonate the SA):
#   kubectl auth can-i list pods    --as=system:serviceaccount:default:pod-reader-sa
#   # → yes
#   kubectl auth can-i list secrets --as=system:serviceaccount:default:pod-reader-sa
#   # → no
#   kubectl auth can-i delete pods  --as=system:serviceaccount:default:pod-reader-sa
#   # → no
#
# See the full effective permissions for the SA:
#   kubectl auth can-i --list --as=system:serviceaccount:default:pod-reader-sa
#
# Inspect the wiring:
#   kubectl get sa pod-reader-sa
#   kubectl describe role pod-reader
#   kubectl describe rolebinding pod-reader-binding
#
# Try it yourself from inside the Pod:
#   kubectl exec -it rbac-demo-pod -- sh
#   # then re-run the curl commands shown in args above
#
# Clean up:
#   kubectl delete -f 02-3-pod-service-account-rbac.yaml
