# =============================================================================
# Kubernetes ServiceAccount — Educational Reference (Part 1 of 3)
# =============================================================================
#
# A ServiceAccount (SA) is the IDENTITY a Pod uses to authenticate to the
# Kubernetes API server. Every Pod runs under exactly one SA — if you don't
# specify one, the namespace's "default" SA is used.
#
# What gets mounted in the container:
#   /var/run/secrets/kubernetes.io/serviceaccount/
#     ├── token       → JWT bearer token (proves identity to the API)
#     ├── ca.crt      → Cluster CA cert (to validate the API server's TLS)
#     └── namespace   → Namespace the Pod runs in
#
# Token mechanism per Kubernetes version:
#   < v1.22  Long-lived token kept in a Secret, auto-mounted (legacy).
#   v1.22+   kubelet uses TokenRequest API → short-lived, auto-rotated token
#            projected into the Pod (default behavior, more secure).
#   v1.24+   The token Secret is NO LONGER auto-created per ServiceAccount.
#            For ad-hoc tokens use:  kubectl create token <sa-name>
#
# Files in this group:
#   12-1 (this file)  Basic SA + Pod that uses it (default modern behavior).
#   12-2              Legacy long-lived token Secret — labeled "do not use".
#   12-3              Recommended modern pattern: projected token volume +
#                     automountServiceAccountToken: false on the SA.
# =============================================================================


# -----------------------------------------------------------------------------
# 1. Custom ServiceAccount
# -----------------------------------------------------------------------------
# Always prefer a per-app SA over reusing "default" — it is the foundation
# for least-privilege RBAC (you bind Roles to this SA, not to the workload).

apiVersion: v1
kind: ServiceAccount
metadata:
  name: demo-service-account
  namespace: default

---

# -----------------------------------------------------------------------------
# 2. Pod using the custom ServiceAccount
# -----------------------------------------------------------------------------
# On v1.22+ the kubelet automatically projects a short-lived, auto-rotated
# token into this Pod at the standard path. No Secret object is involved.

apiVersion: v1
kind: Pod
metadata:
  name: my-kubernetes-dashboard
  labels:
    app: my-kubernetes-dashboard
spec:
  serviceAccountName: demo-service-account   # Use this SA instead of "default"
  # automountServiceAccountToken: false      # Set to false if the Pod never calls the K8s API
  containers:
    - name: app
      image: nginx:alpine                    # Any small image — we only inspect the mounted token
      ports:
        - containerPort: 80


# =============================================================================
# Apply & verify
# =============================================================================
#
# Apply:
#   kubectl apply -f 12-1-service-account-definition.yaml
#
# Confirm the SA exists:
#   kubectl get sa demo-service-account
#   kubectl describe sa demo-service-account
#
# Look at what got mounted inside the Pod (token / ca.crt / namespace):
#   kubectl exec my-kubernetes-dashboard -- ls /var/run/secrets/kubernetes.io/serviceaccount
#   kubectl exec my-kubernetes-dashboard -- cat /var/run/secrets/kubernetes.io/serviceaccount/namespace
#   kubectl exec my-kubernetes-dashboard -- sh -c 'cat /var/run/secrets/kubernetes.io/serviceaccount/token | head -c 40; echo'
#
# Generate an ad-hoc short-lived token (v1.24+):
#   kubectl create token demo-service-account --duration=1h
#
# Clean up:
#   kubectl delete -f 12-1-service-account-definition.yaml
