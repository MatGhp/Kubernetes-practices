# =============================================================================
# Kubernetes ServiceAccount — Educational Reference
# =============================================================================
#
# A ServiceAccount provides an identity for processes running inside a Pod.
# When a Pod calls the Kubernetes API, it authenticates using the token from
# its associated ServiceAccount.
#
# Key concepts:
#   - Every namespace has a "default" ServiceAccount (auto-created).
#   - If no serviceAccountName is specified, the Pod uses "default".
#   - The token is mounted at:
#     /var/run/secrets/kubernetes.io/serviceaccount/token
#   - ServiceAccounts are namespace-scoped.
#
# Token behavior across versions:
#   < v1.22  → Long-lived token auto-created as a Secret and mounted into Pods
#   v1.22+   → Short-lived, auto-rotating projected token (more secure)
#   v1.24+   → Long-lived Secret tokens NO LONGER auto-created.
#              Use: kubectl create token <sa-name> for short-lived tokens.
#
# Security best practices:
#   - Use a dedicated ServiceAccount per app (don't reuse "default").
#   - Set automountServiceAccountToken: false if the Pod doesn't need API access.
#   - Bind RBAC roles to the ServiceAccount to limit permissions.
#
# See also:
#   12-2-service-account-secret-definition.yaml → Long-lived token Secret (legacy)
# =============================================================================


# -----------------------------------------------------------------------------
# 1. ServiceAccount definition
# -----------------------------------------------------------------------------

apiVersion: v1
kind: ServiceAccount
metadata:
  name: demo-service-account
  namespace: default

---

# -----------------------------------------------------------------------------
# 2. Pod using a custom ServiceAccount
# -----------------------------------------------------------------------------
# The Pod authenticates to the API server as "demo-service-account".
# The token is auto-mounted at /var/run/secrets/kubernetes.io/serviceaccount/

apiVersion: v1
kind: Pod
metadata:
  name: my-kubernetes-dashboard
spec:
  serviceAccountName: demo-service-account   # Use this ServiceAccount (not "default")
  # automountServiceAccountToken: false       # Uncomment to prevent token mount (if no API access needed)
  containers:
    - name: kubernetes-dashboard
      image: kubernetesui/dashboard:v2.5.1
      ports:
        - containerPort: 9090


# =============================================================================
# Imperative Commands — Create ServiceAccount
# =============================================================================

# Create a ServiceAccount
# kubectl create serviceaccount demo-service-account
# kubectl create sa demo-service-account

# Create in a specific namespace
# kubectl create sa demo-service-account -n dev

# Generate YAML without creating (dry-run)
# kubectl create sa demo-service-account --dry-run=client -o yaml

# =============================================================================
# Declarative — Apply
# =============================================================================

# Apply this file (creates both the ServiceAccount and the Pod)
# kubectl apply -f 12-1-service-account-definition.yaml

# =============================================================================
# Inspect ServiceAccounts
# =============================================================================

# List ServiceAccounts in the current namespace
# kubectl get serviceaccounts
# kubectl get sa

# Describe a ServiceAccount (shows linked secrets/tokens)
# kubectl describe sa demo-service-account

# Get ServiceAccount in YAML
# kubectl get sa demo-service-account -o yaml

# =============================================================================
# Inspect the Token Inside a Running Pod
# =============================================================================

# List mounted token files
# kubectl exec my-kubernetes-dashboard -- ls /var/run/secrets/kubernetes.io/serviceaccount

# Read the auto-mounted token
# kubectl exec my-kubernetes-dashboard -- cat /var/run/secrets/kubernetes.io/serviceaccount/token

# Read the cluster CA certificate
# kubectl exec my-kubernetes-dashboard -- cat /var/run/secrets/kubernetes.io/serviceaccount/ca.crt

# Read the namespace
# kubectl exec my-kubernetes-dashboard -- cat /var/run/secrets/kubernetes.io/serviceaccount/namespace

# =============================================================================
# Create Tokens (v1.24+)
# =============================================================================

# Create a short-lived token (1 hour default)
# kubectl create token demo-service-account

# Create a token with custom duration
# kubectl create token demo-service-account --duration=24h

# Create a token in a specific namespace
# kubectl create token demo-service-account --duration=24h -n dev

# =============================================================================
# Delete
# =============================================================================

# Delete the ServiceAccount
# kubectl delete sa demo-service-account

# Delete from file
# kubectl delete -f 12-1-service-account-definition.yaml

