# =============================================================================
# Modern ServiceAccount Token Pattern — Educational Reference (Part 3 of 3)
# =============================================================================
#
# ✅  RECOMMENDED PATTERN for production workloads on Kubernetes v1.22+.
#
# Two ideas combined:
#   1. The ServiceAccount sets `automountServiceAccountToken: false`, so the
#      kubelet does NOT auto-mount any token by default. Pods that don't need
#      to talk to the K8s API get nothing — least privilege by default.
#   2. The Deployment opts back in EXPLICITLY by mounting a `projected`
#      volume with a `serviceAccountToken` source. The kubelet asks the
#      TokenRequest API for a short-lived token, writes it into the volume,
#      and rotates it before it expires.
#
# Why this is better than the legacy Secret in 12-2:
#   - Tokens are short-lived (`expirationSeconds`) and auto-rotated.
#   - Tokens are bound to a specific Pod (and optionally `audience`), so
#     they cannot be reused elsewhere.
#   - No long-lived secret material is stored in etcd as a Secret object.
#
# Notes on `expirationSeconds`:
#   - Minimum value is 600 (10 minutes); kubelet refreshes well before expiry.
#   - The kubelet honors a cluster-wide max (commonly 1h–24h depending on
#     `--service-account-extend-token-expiration` and admission settings).
#   - Add `audience: <name>` to scope the token (e.g., for an OIDC verifier).
#
# Pairs with: nothing else needed — this file is self-contained.
# =============================================================================


# -----------------------------------------------------------------------------
# 1. ServiceAccount with auto-mount disabled
# -----------------------------------------------------------------------------

apiVersion: v1
kind: ServiceAccount
metadata:
  name: dashboard-sa
  namespace: default
automountServiceAccountToken: false   # No token in Pods unless they ask for one explicitly

---

# -----------------------------------------------------------------------------
# 2. Deployment that explicitly projects a short-lived token
# -----------------------------------------------------------------------------
# The token lands at the conventional path so client libraries that read
# /var/run/secrets/kubernetes.io/serviceaccount/token still work unchanged.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-dashboard
  namespace: default
  labels:
    app: web-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-dashboard
  template:
    metadata:
      labels:
        app: web-dashboard
    spec:
      serviceAccountName: dashboard-sa     # SA defined above (auto-mount is off)
      containers:
        - name: app
          image: nginx:alpine              # Any small image — we only inspect the mounted token
          ports:
            - containerPort: 80
          volumeMounts:
            - name: kube-api-access
              mountPath: /var/run/secrets/kubernetes.io/serviceaccount
              readOnly: true
      volumes:
        - name: kube-api-access
          projected:
            sources:
              - serviceAccountToken:
                  path: token              # File: /var/run/secrets/kubernetes.io/serviceaccount/token
                  expirationSeconds: 3600  # 1 hour; kubelet rotates before expiry (min 600)
                  # audience: my-api       # Optional: bind the token to a specific recipient


# =============================================================================
# Apply & verify
# =============================================================================
#
# Apply:
#   kubectl apply -f 12-3-deployment-service-account.yaml
#
# Confirm auto-mount is OFF on the SA:
#   kubectl get sa dashboard-sa -o jsonpath='{.automountServiceAccountToken}{"\n"}'
#   # Expected: false
#
# Confirm the projected token landed inside the Pod:
#   kubectl exec deploy/web-dashboard -- ls /var/run/secrets/kubernetes.io/serviceaccount
#   kubectl exec deploy/web-dashboard -- sh -c 'cat /var/run/secrets/kubernetes.io/serviceaccount/token | head -c 40; echo'
#
# Inspect the projected-volume definition on the running Pod:
#   kubectl get pod -l app=web-dashboard -o jsonpath='{.items[0].spec.volumes}' | jq
#
# Prove the SA-only setting blocks tokens (no projected volume = no token):
#   kubectl run no-token --rm -it --image=busybox --restart=Never \
#     --overrides='{"spec":{"serviceAccountName":"dashboard-sa"}}' \
#     -- ls /var/run/secrets/kubernetes.io/serviceaccount 2>&1 || echo "no token mounted (expected)"
#
# Clean up:
#   kubectl delete -f 12-3-deployment-service-account.yaml
