# =============================================================================
# Web Dashboard Deployment — Projected ServiceAccount Token
# =============================================================================
#
# Use case:
#   The ServiceAccount "dashboard-sa" has automountServiceAccountToken: false,
#   so no token is mounted by default. This Deployment explicitly injects a
#   short-lived, projected token at the standard path:
#     /var/run/secrets/kubernetes.io/serviceaccount/token
#
# How projected serviceAccountToken works:
#   - The kubelet requests a short-lived token from the TokenRequest API.
#   - The token is written to the specified path inside the container.
#   - The kubelet automatically rotates the token before it expires.
#   - expirationSeconds controls the token lifetime (min 600 = 10 minutes).
#
# Requires:
#   ServiceAccount "dashboard-sa" from:
#   12-2-service-account-secret-definition.yaml
#
# Apply:
#   kubectl apply -f 12-2-service-account-secret-definition.yaml
#   kubectl apply -f 12-3-deployment-service-account.yaml
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-dashboard
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-dashboard
  template:
    metadata:
      labels:
        app: web-dashboard
    spec:
      serviceAccountName: dashboard-sa        # Use the SA with auto-mount disabled

      containers:
        - name: dashboard
          image: kubernetesui/dashboard:v2.5.1
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: token                     # Mount the projected token volume
              mountPath: /var/run/secrets/kubernetes.io/serviceaccount
              readOnly: true                  # Read-only for security

      volumes:
        - name: token                         # Projected volume named "token"
          projected:
            sources:
              - serviceAccountToken:
                  expirationSeconds: 3600     # Token valid for 1 hour (auto-rotated)
                  path: token                 # File: /var/run/secrets/kubernetes.io/serviceaccount/token


# =============================================================================
# Sample Commands
# =============================================================================

# Apply the ServiceAccount (with auto-mount disabled)
# kubectl apply -f 12-2-service-account-secret-definition.yaml

# Apply this Deployment
# kubectl apply -f 12-3-deployment-service-account.yaml

# Verify the Deployment is running
# kubectl get deployment web-dashboard

# Verify the token is mounted inside the pod
# kubectl exec deploy/web-dashboard -- ls -la /var/run/secrets/kubernetes.io/serviceaccount/
# kubectl exec deploy/web-dashboard -- cat /var/run/secrets/kubernetes.io/serviceaccount/token

# Verify the ServiceAccount has auto-mount disabled
# kubectl get sa dashboard-sa -o jsonpath='{.automountServiceAccountToken}'
# Expected: false

# Check the projected volume in the pod spec
# kubectl get pod -l app=web-dashboard -o jsonpath='{.items[0].spec.volumes}'

# Delete
# kubectl delete -f deployment.yaml
