# =============================================================================
# Legacy ServiceAccount Token Secret — Educational Reference (Part 2 of 3)
# =============================================================================
#
# ⚠️  LEGACY PATTERN — avoid in new workloads.
#
# This file exists to demonstrate the OLD way of giving a ServiceAccount a
# long-lived, non-expiring token stored in a Secret of type
#   kubernetes.io/service-account-token
#
# Behavior across Kubernetes versions:
#   < v1.24   K8s automatically created such a Secret for every ServiceAccount
#             and auto-mounted it into Pods.
#   v1.24+    K8s does NOT auto-create that Secret anymore. If you really
#             need a non-expiring token, you create it explicitly (as below)
#             and the token-controller will populate the `data.token` field.
#
# Why it is discouraged today:
#   - Tokens never expire → if leaked, they are valid forever (until SA is
#     deleted or the Secret is rotated).
#   - There is no built-in audience binding — anyone holding the token can
#     use it against any Kubernetes API client.
#   - You must manually rotate.
#
# Modern alternatives (use these instead):
#   - For Pods:   the projected serviceAccountToken volume (see 12-3).
#   - For ad-hoc: `kubectl create token <sa-name> --duration=1h` (TokenRequest API).
# =============================================================================


# -----------------------------------------------------------------------------
# 1. ServiceAccount that the legacy token will belong to
# -----------------------------------------------------------------------------
# Named "legacy-token-sa" to make its purpose unambiguous in this file.

apiVersion: v1
kind: ServiceAccount
metadata:
  name: legacy-token-sa
  namespace: default

---

# -----------------------------------------------------------------------------
# 2. Long-lived token Secret bound to that ServiceAccount  (LEGACY)
# -----------------------------------------------------------------------------
# Two things make this Secret special:
#   - type:                                kubernetes.io/service-account-token
#   - annotation kubernetes.io/service-account.name: <SA name>
#
# After apply, the token-controller fills in data.token (JWT), data.ca.crt,
# and data.namespace. You provide no values yourself.

apiVersion: v1
kind: Secret
type: kubernetes.io/service-account-token
metadata:
  name: legacy-token-sa-token
  namespace: default
  annotations:
    kubernetes.io/service-account.name: legacy-token-sa


# =============================================================================
# Apply & verify
# =============================================================================
#
# Apply:
#   kubectl apply -f 12-2-service-account-secret-definition.yaml
#
# Confirm the token-controller populated the Secret:
#   kubectl get secret legacy-token-sa-token -o jsonpath='{.data.token}' | base64 -d | head -c 40; echo
#   kubectl get secret legacy-token-sa-token -o jsonpath='{.data.ca\.crt}'   | base64 -d | head -c 60; echo
#
# Use the token to call the API server directly (illustrative; --insecure only
# for local clusters such as minikube/kind/Docker Desktop):
#   TOKEN=$(kubectl get secret legacy-token-sa-token -o jsonpath='{.data.token}' | base64 -d)
#   APISERVER=$(kubectl config view --minify -o jsonpath='{.clusters[0].cluster.server}')
#   curl --insecure -H "Authorization: Bearer $TOKEN" "$APISERVER/api/v1/namespaces/default/pods"
#
# Modern replacement (preferred — short-lived, audience-bindable):
#   kubectl create token legacy-token-sa --duration=1h
#
# Clean up:
#   kubectl delete -f 12-2-service-account-secret-definition.yaml
