# =============================================================================
# ServiceAccount Token Secret — Educational Reference
# =============================================================================
#
# A ServiceAccount provides an identity for processes running in a Pod.
# Pods use this identity to authenticate to the Kubernetes API server.
#
# Token history (important version changes):
#   < v1.22  → A long-lived Secret was auto-created for each ServiceAccount
#               and auto-mounted into Pods at /var/run/secrets/kubernetes.io/serviceaccount/token
#   v1.22+   → TokenRequest API introduced: short-lived, auto-rotating tokens
#               projected into Pods (no Secret needed)
#   v1.24+   → Auto-creation of long-lived Secret tokens is REMOVED.
#               You must explicitly create them if needed.
#
# When to use this Secret type:
#   - You need a NON-EXPIRING token (e.g., external CI/CD systems, dashboards)
#   - You cannot use the TokenRequest API (kubectl create token)
#   - Legacy apps that expect a static token
#
# Preferred alternative (v1.22+):
#   kubectl create token <service-account-name> --duration=24h
#   This creates a short-lived, bound token — more secure.
#
# See 12-1-service-account-definition.yaml for the ServiceAccount + Pod example.
# =============================================================================


# -----------------------------------------------------------------------------
# Long-lived ServiceAccount Token Secret (legacy approach)
# -----------------------------------------------------------------------------
# Creates a non-expiring token bound to the specified ServiceAccount.
# The token is auto-populated by Kubernetes in the Secret's "data.token" field.

apiVersion: v1
kind: Secret
type: kubernetes.io/service-account-token   # Special type — K8s generates the token
metadata:
  name: dashboard-sa-token
  annotations:
    kubernetes.io/service-account.name: dashboard-sa  # ServiceAccount this token belongs to


# =============================================================================
# How K8s Populates This Secret
# =============================================================================
#
# After applying, Kubernetes automatically adds three fields to data:
#   - token      → The JWT bearer token (used for API auth)
#   - ca.crt     → The cluster CA certificate
#   - namespace  → The namespace of the ServiceAccount
#
# You can retrieve the token with:
# kubectl get secret dashboard-sa-token -o jsonpath='{.data.token}' | base64 -d


# =============================================================================
# Sample Commands
# =============================================================================

# Apply this Secret
# kubectl apply -f 12-2-service-account-secret-definition.yaml

# List all secrets (look for type kubernetes.io/service-account-token)
# kubectl get secrets

# Describe the secret (shows the linked ServiceAccount)
# kubectl describe secret dashboard-sa-token

# Extract the token value (decoded)
# kubectl get secret dashboard-sa-token -o jsonpath='{.data.token}' | base64 -d

# Extract the CA certificate
# kubectl get secret dashboard-sa-token -o jsonpath='{.data.ca\.crt}' | base64 -d

# Use the token to call the API server directly (e.g., with curl)
# TOKEN=$(kubectl get secret dashboard-sa-token -o jsonpath='{.data.token}' | base64 -d)
# curl -H "Authorization: Bearer $TOKEN" https://<api-server>/api/v1/namespaces/default/pods --insecure

# =============================================================================
# Preferred: Short-lived Token via TokenRequest API (v1.22+)
# =============================================================================

# Create a short-lived token (expires in 1 hour by default)
# kubectl create token dashboard-sa

# Create a token with custom duration
# kubectl create token dashboard-sa --duration=24h

# Create a token and save to file
# kubectl create token dashboard-sa --duration=8h > token.txt

# =============================================================================
# Delete
# =============================================================================

# Delete the secret
# kubectl delete secret dashboard-sa-token

# Delete from file
# kubectl delete -f 12-2-service-account-secret-definition.yaml


# =============================================================================
# Use Case: Projected Volume Token with Auto-Mount Disabled
# =============================================================================
#
# Scenario:
#   1. Disable automatic token mounting on the ServiceAccount (security hardening).
#   2. Explicitly mount a short-lived, projected ServiceAccount token into the
#      Deployment at a known path using a projected volume.
#
# Why do this:
#   - automountServiceAccountToken: false prevents ALL Pods using this SA from
#     getting a token by default — reduces attack surface.
#   - A projected volume gives you control over token expiration, audience, and
#     mount path — more secure than the legacy auto-mounted token.
#
# Files:
#   - ServiceAccount:  12-2-service-account-secret-definition.yaml (this file, below)
#   - Deployment:      12-3-deployment-service-account.yaml
#
# Steps:
#   kubectl apply -f 12-2-service-account-secret-definition.yaml
#   kubectl apply -f 12-3-deployment-service-account.yaml
# =============================================================================


# -----------------------------------------------------------------------------
# Step 1: ServiceAccount with auto-mount DISABLED
# -----------------------------------------------------------------------------
---

apiVersion: v1
kind: ServiceAccount
metadata:
  name: dashboard-sa
  namespace: default
automountServiceAccountToken: false   # No token mounted unless explicitly requested

---

# -----------------------------------------------------------------------------
# Step 2: Deployment with projected volume token
# -----------------------------------------------------------------------------
# See web-dashboard/deployment.yaml for the full file.
# The key parts are:
#
#   volumes:
#     - name: token
#       projected:
#         sources:
#           - serviceAccountToken:
#               expirationSeconds: 3600    # Token expires in 1 hour
#               path: token                # Filename inside the mount
#
#   volumeMounts:
#     - name: token
#       mountPath: /var/run/secrets/kubernetes.io/serviceaccount
#       readOnly: true
# -----------------------------------------------------------------------------
# kubectl delete -f 12-2-service-account-secret-definition.yaml

