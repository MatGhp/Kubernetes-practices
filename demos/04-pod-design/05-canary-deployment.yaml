# =============================================================================
# Kubernetes Canary Deployment Γאפ Educational Reference
# =============================================================================
#
# A canary deployment gradually shifts a small percentage of production traffic
# to a new version while the stable version continues serving the majority.
# If the canary behaves well (latency, errors, business metrics), you
# progressively scale it up until it replaces the stable version entirely.
# If it fails, you scale it back to zero Γאפ only a small fraction of users
# were ever exposed.
#
# How it works with native Kubernetes (no service mesh):
#   1. A "Stable" Deployment runs the current version with N replicas.
#   2. You create a "Canary" Deployment with the new version and 1 replica.
#   3. A single Service selects Pods from BOTH Deployments using a shared
#      label (e.g., app=myapp). Kubernetes distributes traffic roughly
#      proportional to the number of ready Pods behind the Service.
#   4. With 3 stable + 1 canary Γזע ~25% traffic goes to canary.
#   5. You observe metrics. If healthy, scale canary up and stable down
#      until canary fully replaces stable.
#
#   Traffic distribution (initial Γאפ 75/25):
#
#     Users ΓפאΓפאΓצ║ myapp-service (selector: app=myapp)
#                  Γפג
#                  Γפ£ΓפאΓפאΓצ║ Stable Deployment (3 replicas)  Γיט 75% traffic
#                  Γפג    ΓפלΓפאΓפאΓפאΓפאΓפאΓפאΓפנ ΓפלΓפאΓפאΓפאΓפאΓפאΓפאΓפנ ΓפלΓפאΓפאΓפאΓפאΓפאΓפאΓפנ
#                  Γפג    Γפגv1.21 Γפג Γפגv1.21 Γפג Γפגv1.21 Γפג
#                  Γפג    ΓפפΓפאΓפאΓפאΓפאΓפאΓפאΓפר ΓפפΓפאΓפאΓפאΓפאΓפאΓפאΓפר ΓפפΓפאΓפאΓפאΓפאΓפאΓפאΓפר
#                  Γפג
#                  ΓפפΓפאΓפאΓצ║ Canary Deployment (1 replica)   Γיט 25% traffic
#                       ΓפלΓפאΓפאΓפאΓפאΓפאΓפאΓפנ
#                       Γפגv1.22 Γפג
#                       ΓפפΓפאΓפאΓפאΓפאΓפאΓפאΓפר
#
#   Gradual promotion (50/50):
#
#     Stable (2 replicas)       Canary (2 replicas)
#     ΓפלΓפאΓפאΓפאΓפאΓפאΓפאΓפנ ΓפלΓפאΓפאΓפאΓפאΓפאΓפאΓפנ        ΓפלΓפאΓפאΓפאΓפאΓפאΓפאΓפנ ΓפלΓפאΓפאΓפאΓפאΓפאΓפאΓפנ
#     Γפגv1.21 Γפג Γפגv1.21 Γפג        Γפגv1.22 Γפג Γפגv1.22 Γפג
#     ΓפפΓפאΓפאΓפאΓפאΓפאΓפאΓפר ΓפפΓפאΓפאΓפאΓפאΓפאΓפאΓפר        ΓפפΓפאΓפאΓפאΓפאΓפאΓפאΓפר ΓפפΓפאΓפאΓפאΓפאΓפאΓפאΓפר
#           Γיט 50%                    Γיט 50%
#
#   Full promotion (0/100):
#
#     Stable (0 replicas)       Canary (4 replicas Γזע rename to stable)
#                               ΓפלΓפאΓפאΓפאΓפאΓפאΓפאΓפנ ΓפלΓפאΓפאΓפאΓפאΓפאΓפאΓפנ ΓפלΓפאΓפאΓפאΓפאΓפאΓפאΓפנ ΓפלΓפאΓפאΓפאΓפאΓפאΓפאΓפנ
#                               Γפגv1.22 Γפג Γפגv1.22 Γפג Γפגv1.22 Γפג Γפגv1.22 Γפג
#                               ΓפפΓפאΓפאΓפאΓפאΓפאΓפאΓפר ΓפפΓפאΓפאΓפאΓפאΓפאΓפאΓפר ΓפפΓפאΓפאΓפאΓפאΓפאΓפאΓפר ΓפפΓפאΓפאΓפאΓפאΓפאΓפאΓפר
#                                        Γיט 100%
#
# Key concept Γאפ traffic split via replica ratio:
#   ΓפלΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפ¼ΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפ¼ΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפ¼ΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפנ
#   Γפג Stable    Γפג Canary         Γפג Total Pods     Γפג Canary Traffic %  Γפג
#   Γפ£ΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפ╝ΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפ╝ΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפ╝ΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפñ
#   Γפג 3         Γפג 1              Γפג 4              Γפג ~25%              Γפג
#   Γפג 3         Γפג 3              Γפג 6              Γפג ~50%              Γפג
#   Γפג 1         Γפג 3              Γפג 4              Γפג ~75%              Γפג
#   Γפג 0         Γפג 4              Γפג 4              Γפג 100% (promoted)   Γפג
#   ΓפפΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפ┤ΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפ┤ΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפ┤ΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפר
#
# Canary vs Blue-Green vs Rolling Update:
#   ΓפלΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפ¼ΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפ¼ΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפ¼ΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפנ
#   Γפג             Γפג Canary            Γפג Blue-Green       Γפג Rolling Update Γפג
#   Γפ£ΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפ╝ΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפ╝ΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפ╝ΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפñ
#   Γפג Exposure    Γפג Small % first     Γפג All-or-nothing   Γפג Gradual per PodΓפג
#   Γפג Rollback    Γפג Scale canary to 0 Γפג Switch selector  Γפג Rollout undo   Γפג
#   Γפג Observation Γפג Real user traffic Γפג Pre-switch tests Γפג During rollout Γפג
#   Γפג Resource    Γפג ~1x + small extra Γפג 2x               Γפג ~1x + surge    Γפג
#   Γפג Precision   Γפג Coarse (Pod ratio)Γפג Exact (selector) Γפג Built-in       Γפג
#   ΓפפΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפ┤ΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפ┤ΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפ┤ΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפאΓפר
#
# Limitations of native Kubernetes canary:
#   - Traffic split is approximate Γאפ based on Pod count, not exact percentages
#   - No per-request routing (e.g., header-based, cookie-based)
#   - For fine-grained traffic control, use a service mesh (Istio, Linkerd)
#     with VirtualService/TrafficSplit resources
#
# See also:
#   - 03-roulling-updates-rollback-deployment.yaml for rolling update strategy
#   - 04-blue-green-deployment.yaml for blue-green deployment strategy
#
# =============================================================================


# -----------------------------------------------------------------------------
# 1. Stable Deployment (current production version)
# -----------------------------------------------------------------------------
# This Deployment runs the proven, current version. It has the majority of
# replicas, so it receives the majority of traffic from the shared Service.
#
# Important: The Pod template labels include app=myapp (shared with canary)
# AND track=stable (unique to this Deployment). The Service only selects on
# app=myapp, so it matches Pods from BOTH stable and canary.
# -----------------------------------------------------------------------------

apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp-stable
  labels:
    app: myapp
    track: stable          # Identifies this as the stable environment
spec:
  replicas: 3              # 3 of 4 total Pods Γזע ~75% of traffic
  selector:
    matchLabels:
      app: myapp
      track: stable        # Must match template labels exactly
  template:
    metadata:
      labels:
        app: myapp         # Shared label Γאפ Service selects on this
        track: stable      # Unique label Γאפ use to query stable Pods only
    spec:
      containers:
        - name: myapp
          image: nginx:1.21  # Current production version
          ports:
            - containerPort: 80

---

# -----------------------------------------------------------------------------
# 2. Canary Deployment (new version, small scale)
# -----------------------------------------------------------------------------
# This Deployment runs the new version with a small number of replicas.
# Because it shares the app=myapp label with stable, the Service routes
# a proportional share of traffic to it (1 of 4 Pods Γזע ~25%).
#
# Start with 1 replica. If metrics look good, scale up gradually while
# scaling down the stable Deployment.
# -----------------------------------------------------------------------------

apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp-canary
  labels:
    app: myapp
    track: canary          # Identifies this as the canary environment
spec:
  replicas: 1              # 1 of 4 total Pods Γזע ~25% of traffic
  selector:
    matchLabels:
      app: myapp
      track: canary
  template:
    metadata:
      labels:
        app: myapp         # Same shared label as stable
        track: canary      # Unique label Γאפ use to query canary Pods only
    spec:
      containers:
        - name: myapp
          image: nginx:1.22  # New version under test
          ports:
            - containerPort: 80

---

# -----------------------------------------------------------------------------
# 3. Service (routes to BOTH stable and canary)
# -----------------------------------------------------------------------------
# The Service selector uses ONLY the shared label (app: myapp).
# This means ALL Pods with app=myapp Γאפ regardless of track Γאפ receive traffic.
# Traffic is distributed roughly by Pod count (round-robin by default).
#
#   selector: app=myapp  Γזע  matches stable Pods AND canary Pods
#
# This is the key difference from blue-green, where the Service selector
# includes the version label to target only ONE environment at a time.
# -----------------------------------------------------------------------------

apiVersion: v1
kind: Service
metadata:
  name: myapp-service
  labels:
    app: myapp
spec:
  type: ClusterIP
  selector:
    app: myapp             # Matches BOTH stable and canary Pods
  ports:
    - protocol: TCP
      port: 80             # Service port
      targetPort: 80       # Pod port


# =============================================================================
# Step-by-Step: Performing a Canary Deployment
# =============================================================================

# STEP 1: Deploy stable version and Service
# kubectl apply -f 05-canary-deployment.yaml

# STEP 2: Verify all Pods are running with labels
# kubectl get pods -l app=myapp --show-labels
#   You should see 3 stable + 1 canary = 4 Pods total

# STEP 3: Verify the Service endpoints include all Pods
# kubectl get endpoints myapp-service
#   Should list IPs from both stable and canary Pods

# STEP 4: Observe canary behavior
# Send test traffic and check responses:
# kubectl run test-canary --image=curlimages/curl --rm -it --restart=Never -- \
#   sh -c 'for i in $(seq 1 20); do curl -s http://myapp-service; done'
#
# Monitor logs from canary Pods specifically:
# kubectl logs -l track=canary --follow
#
# Check canary Pod resource usage:
# kubectl top pods -l track=canary


# =============================================================================
# Gradual Promotion (scaling up canary traffic)
# =============================================================================

# Increase canary to ~50% (2 stable + 2 canary):
# kubectl scale deployment myapp-canary --replicas=2
# kubectl scale deployment myapp-stable --replicas=2

# Increase canary to ~75% (1 stable + 3 canary):
# kubectl scale deployment myapp-canary --replicas=3
# kubectl scale deployment myapp-stable --replicas=1

# Full promotion Γאפ 100% canary (0 stable + 4 canary):
# kubectl scale deployment myapp-canary --replicas=4
# kubectl scale deployment myapp-stable --replicas=0

# After full promotion, update the stable Deployment image to the new version
# and scale it back up, then remove the canary:
# kubectl set image deployment/myapp-stable myapp=nginx:1.22
# kubectl scale deployment myapp-stable --replicas=4
# kubectl delete deployment myapp-canary


# =============================================================================
# Rollback (abort canary)
# =============================================================================

# If the canary shows errors, high latency, or bad metrics Γאפ scale it to 0:
# kubectl scale deployment myapp-canary --replicas=0

# Or delete the canary entirely:
# kubectl delete deployment myapp-canary

# Restore stable to full capacity if you scaled it down:
# kubectl scale deployment myapp-stable --replicas=4

# Verify only stable Pods are serving traffic:
# kubectl get endpoints myapp-service
# kubectl get pods -l app=myapp --show-labels


# =============================================================================
# Inspect / Debug
# =============================================================================

# List all Pods with their track labels
# kubectl get pods -l app=myapp --show-labels -o wide

# See only stable or only canary Pods
# kubectl get pods -l track=stable
# kubectl get pods -l track=canary

# Check current replica counts
# kubectl get deployments -l app=myapp

# Verify endpoints (which Pod IPs are behind the Service)
# kubectl get endpoints myapp-service -o yaml

# Describe the Service to see selector and endpoints summary
# kubectl describe service myapp-service

# Watch Pod changes in real time during scaling
# kubectl get pods -l app=myapp --watch

# Compare image versions across all Pods
# kubectl get pods -l app=myapp -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{.spec.containers[0].image}{"\n"}{end}'


# =============================================================================
# Delete / Clean up
# =============================================================================

# Delete all resources defined in this file
# kubectl delete -f 05-canary-deployment.yaml

# Delete by label (both deployments + service)
# kubectl delete all -l app=myapp
