# =============================================================================
# Kubernetes CronJob — Educational Reference
# =============================================================================
#
# A CronJob creates Jobs on a repeating schedule, using the standard Unix cron
# syntax. Each time the schedule fires, the CronJob controller creates a new
# Job, which in turn creates Pods to perform the work. Once the Pods complete,
# the Job is marked as finished — and the CronJob waits for the next trigger.
#
# How it works:
#   1. You define a CronJob with a cron schedule and a Job template.
#   2. At each scheduled time, the CronJob controller creates a new Job.
#   3. That Job creates Pods (just like a standalone Job).
#   4. Pods run to completion, Job is marked complete.
#   5. Old Jobs are retained up to successfulJobsHistoryLimit /
#      failedJobsHistoryLimit, then auto-deleted.
#
#   CronJob lifecycle:
#
#     CronJob (schedule: "*/5 * * * *")
#         │
#         ├── 10:00 → creates Job-abc → Pods run → complete ✓
#         ├── 10:05 → creates Job-def → Pods run → complete ✓
#         ├── 10:10 → creates Job-ghi → Pods run → failed ✗
#         ├── 10:15 → creates Job-jkl → Pods run → complete ✓
#         └── ...continues on schedule...
#
# Cron schedule syntax:
#   ┌───────────── minute (0–59)
#   │ ┌───────────── hour (0–23)
#   │ │ ┌───────────── day of month (1–31)
#   │ │ │ ┌───────────── month (1–12)
#   │ │ │ │ ┌───────────── day of week (0–6, Sun=0)
#   │ │ │ │ │
#   * * * * *
#
# Schedule examples:
#   ┌─────────────────────┬────────────────────────────────────────┐
#   │ Expression          │ Meaning                                │
#   ├─────────────────────┼────────────────────────────────────────┤
#   │ */5 * * * *         │ Every 5 minutes                        │
#   │ 0 * * * *           │ Every hour (at minute 0)               │
#   │ 0 0 * * *           │ Every day at midnight                  │
#   │ 0 2 * * 1           │ Every Monday at 2:00 AM                │
#   │ 0 0 1 * *           │ First day of every month at midnight   │
#   │ 30 8 * * 1-5        │ Weekdays at 8:30 AM                   │
#   │ 0 0 * * 0           │ Every Sunday at midnight               │
#   │ */10 9-17 * * 1-5   │ Every 10 min, 9AM–5PM, Mon–Fri        │
#   └─────────────────────┴────────────────────────────────────────┘
#
# Key CronJob-specific fields:
#   ┌──────────────────────────────┬──────────────────────────────────────────┐
#   │ Field                        │ Description                              │
#   ├──────────────────────────────┼──────────────────────────────────────────┤
#   │ schedule                     │ Cron expression (required)               │
#   │ concurrencyPolicy            │ Allow / Forbid / Replace overlapping Jobs│
#   │ startingDeadlineSeconds      │ Max seconds late a Job can start         │
#   │ successfulJobsHistoryLimit   │ How many completed Jobs to keep (def: 3) │
#   │ failedJobsHistoryLimit       │ How many failed Jobs to keep (def: 1)    │
#   │ suspend                      │ If true, no new Jobs are created         │
#   │ timeZone                     │ IANA time zone (e.g., "America/New_York")│
#   │                              │ Available since Kubernetes 1.27 (stable) │
#   └──────────────────────────────┴──────────────────────────────────────────┘
#
# concurrencyPolicy options:
#   ┌─────────┬──────────────────────────────────────────────────────────────┐
#   │ Value   │ Behavior                                                     │
#   ├─────────┼──────────────────────────────────────────────────────────────┤
#   │ Allow   │ (Default) Multiple Jobs can run at the same time             │
#   │ Forbid  │ Skip the new Job if the previous one is still running        │
#   │ Replace │ Cancel the running Job and start a new one                   │
#   └─────────┴──────────────────────────────────────────────────────────────┘
#
#   Allow:   Job-1 ████████
#            Job-2    ████████       ← both run concurrently
#
#   Forbid:  Job-1 ████████████
#            Job-2 (skipped)         ← schedule fires but Job-1 still active
#
#   Replace: Job-1 ██████ ✗ killed
#            Job-2       ████████    ← replaces Job-1
#
# See also:
#   - 06-job-definition.yaml for standalone Job reference
#
# =============================================================================


# -----------------------------------------------------------------------------
# 1. Simple CronJob — runs every 5 minutes
# -----------------------------------------------------------------------------
# The most basic CronJob: fires on schedule, creates a Job with one Pod,
# prints the date and a message, then exits.
# -----------------------------------------------------------------------------

apiVersion: batch/v1
kind: CronJob
metadata:
  name: simple-cronjob
  labels:
    app: hello-cron
spec:
  schedule: "*/5 * * * *"          # Every 5 minutes
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: hello-cron
        spec:
          containers:
            - name: hello
              image: busybox:1.36   # Specific tag — never use :latest
              command:
                - /bin/sh
                - -c
                - date; echo "Hello from the Kubernetes CronJob!"
          restartPolicy: OnFailure

---

# -----------------------------------------------------------------------------
# 2. CronJob with parallel completions
# -----------------------------------------------------------------------------
# Combines CronJob scheduling with the Job's completions/parallelism fields.
# Each scheduled trigger creates a Job that needs 4 successful completions,
# running 2 Pods at a time.
#
#   10:00 trigger → Job needs 4 completions, 2 parallel
#     t0: Pod-A, Pod-B start
#     t1: Pod-A done → Pod-C starts (completions: 1)
#     t2: Pod-B done → Pod-D starts (completions: 2)
#     t3: Pod-C done              (completions: 3)
#     t4: Pod-D done → Job complete (completions: 4 ✓)
# -----------------------------------------------------------------------------

apiVersion: batch/v1
kind: CronJob
metadata:
  name: batch-cronjob
  labels:
    app: batch-cron
spec:
  schedule: "0 */2 * * *"           # Every 2 hours (at minute 0)
  concurrencyPolicy: Forbid          # Skip if previous Job is still running
  jobTemplate:
    spec:
      completions: 4                 # Each Job needs 4 successful Pods
      parallelism: 2                 # Run 2 Pods at a time
      template:
        metadata:
          labels:
            app: batch-cron
        spec:
          containers:
            - name: worker
              image: busybox:1.36
              command:
                - /bin/sh
                - -c
                - |
                  echo "Batch item processing started at $(date)"
                  sleep $(( RANDOM % 10 + 5 ))
                  echo "Batch item done!"
          restartPolicy: Never
      backoffLimit: 3

---

# -----------------------------------------------------------------------------
# 3. CronJob with concurrencyPolicy: Replace
# -----------------------------------------------------------------------------
# If the previous Job is still running when the next schedule fires,
# the old Job is terminated and a new one starts. Useful when you always
# want the latest data and old runs become stale.
# -----------------------------------------------------------------------------

apiVersion: batch/v1
kind: CronJob
metadata:
  name: replace-cronjob
  labels:
    app: replace-cron
spec:
  schedule: "*/10 * * * *"           # Every 10 minutes
  concurrencyPolicy: Replace          # Kill old Job, start fresh
  startingDeadlineSeconds: 120        # If missed by >120s, skip this occurrence
  jobTemplate:
    spec:
      activeDeadlineSeconds: 540      # Kill Job if it runs longer than 9 minutes
      template:
        metadata:
          labels:
            app: replace-cron
        spec:
          containers:
            - name: sync
              image: busybox:1.36
              command:
                - /bin/sh
                - -c
                - |
                  echo "Sync started at $(date)"
                  sleep 30
                  echo "Sync complete!"
          restartPolicy: Never
      backoffLimit: 2

---

# -----------------------------------------------------------------------------
# 4. CronJob with history limits and time zone
# -----------------------------------------------------------------------------
# Controls how many completed/failed Jobs are kept for inspection, and
# uses a specific time zone so the schedule fires at the expected local time.
#
# Without timeZone, the schedule uses the kube-controller-manager's time zone
# (usually UTC). Setting timeZone explicitly avoids confusion.
# (timeZone requires Kubernetes ≥ 1.27 stable)
# -----------------------------------------------------------------------------

apiVersion: batch/v1
kind: CronJob
metadata:
  name: cleanup-cronjob
  labels:
    app: cleanup-cron
spec:
  schedule: "0 3 * * *"              # Daily at 3:00 AM
  timeZone: "America/New_York"        # Fire at 3 AM Eastern, not UTC
  successfulJobsHistoryLimit: 5       # Keep last 5 successful Jobs (default: 3)
  failedJobsHistoryLimit: 3           # Keep last 3 failed Jobs (default: 1)
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 86400  # Auto-delete Job 24 hours after finishing
      template:
        metadata:
          labels:
            app: cleanup-cron
        spec:
          containers:
            - name: cleanup
              image: busybox:1.36
              command:
                - /bin/sh
                - -c
                - |
                  echo "Daily cleanup started at $(date)"
                  echo "Removing temp files..."
                  sleep 5
                  echo "Cleanup complete!"
          restartPolicy: OnFailure
      backoffLimit: 2


# =============================================================================
# Creating and Managing CronJobs
# =============================================================================

# Apply all CronJobs defined in this file
# kubectl apply -f 07-cron-job-definition.yaml

# Create a CronJob imperatively (no YAML needed)
# kubectl create cronjob quick-cron --image=busybox:1.36 --schedule="*/5 * * * *" \
#   -- /bin/sh -c "date; echo quick cron"


# =============================================================================
# Monitoring CronJobs and their Jobs
# =============================================================================

# List all CronJobs with schedule and last trigger time
# kubectl get cronjobs
#   SCHEDULE    SUSPEND   ACTIVE   LAST SCHEDULE
#   */5 * * * * False     0        2m ago

# Watch Jobs being created on schedule
# kubectl get jobs --watch

# List Jobs created by a specific CronJob
# kubectl get jobs -l app=hello-cron

# List Pods from the most recent Job run
# kubectl get pods -l app=hello-cron --sort-by=.metadata.creationTimestamp

# View logs from the latest Job Pod
# kubectl logs -l app=hello-cron --tail=50

# Detailed info about a CronJob (events, conditions, active Jobs)
# kubectl describe cronjob simple-cronjob


# =============================================================================
# Trigger a Job Manually (outside the schedule)
# =============================================================================

# Create a one-off Job from a CronJob definition
# kubectl create job manual-run --from=cronjob/simple-cronjob
#   This creates a Job immediately, without waiting for the next schedule.
#   Useful for testing or triggering an ad-hoc run.


# =============================================================================
# Suspend / Resume a CronJob
# =============================================================================

# Suspend — no new Jobs will be created (existing Jobs keep running)
# kubectl patch cronjob simple-cronjob -p '{"spec":{"suspend":true}}'

# Resume — scheduling resumes from the next trigger
# kubectl patch cronjob simple-cronjob -p '{"spec":{"suspend":false}}'

# Verify suspend status
# kubectl get cronjob simple-cronjob -o jsonpath='{.spec.suspend}'


# =============================================================================
# Inspect / Debug
# =============================================================================

# Check CronJob schedule, last schedule time, and active Jobs
# kubectl get cronjobs -o wide

# See the last scheduled time
# kubectl get cronjob simple-cronjob -o jsonpath='{.status.lastScheduleTime}'

# List currently active (running) Jobs for a CronJob
# kubectl get cronjob simple-cronjob -o jsonpath='{.status.active}'

# See history of Jobs (both successful and failed)
# kubectl get jobs -l app=hello-cron --sort-by=.metadata.creationTimestamp

# Check events for missed schedules or failures
# kubectl get events --field-selector involvedObject.name=simple-cronjob

# Inspect concurrencyPolicy behavior — check if Jobs were skipped or replaced
# kubectl describe cronjob batch-cronjob | grep -A5 Events


# =============================================================================
# Delete / Clean up
# =============================================================================

# Delete a CronJob and all its child Jobs and Pods
# kubectl delete cronjob simple-cronjob

# Delete all resources defined in this file
# kubectl delete -f 07-cron-job-definition.yaml

# Delete all CronJobs in the namespace
# kubectl delete cronjobs --all

# Delete orphaned Jobs left behind (if CronJob already deleted)
# kubectl delete jobs -l app=hello-cron
